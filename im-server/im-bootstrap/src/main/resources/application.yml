server:
  port: 8081

spring:
  application:
    name: im-server
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${IM_MYSQL_URL:jdbc:mysql://localhost:3306/im?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${IM_MYSQL_USERNAME:root}
    password: ${IM_MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${IM_REDIS_HOST:103.45.65.84}
      port: ${IM_REDIS_PORT:6379}
      password: imchatjade
  rabbitmq:
    # 仅本地开发默认值；生产用 docker profile（application-docker.yml）从环境变量注入且无默认值（fail-fast）。
    host: ${IM_RABBITMQ_HOST:${RABBITMQ_HOST:103.45.65.84}}
    port: ${IM_RABBITMQ_PORT:${RABBITMQ_PORT:5672}}
    username: ${IM_RABBITMQ_USERNAME:${RABBITMQ_USER:admin}}
    password: ${IM_RABBITMQ_PASSWORD:${RABBITMQ_PASSWORD:admin123sfg}}
    publisher-confirm-type: correlated
    listener:
      simple:
        auto-startup: ${IM_RABBITMQ_LISTENER_AUTO_STARTUP:true}
        # D-2 推送扇出是全系统实时下行入口，默认单消费者会成为吞吐瓶颈。
        # 并发消费配合 dedup+幂等（server_msg_id）安全；prefetch 控制每消费者预取量。
        concurrency: ${IM_RABBITMQ_LISTENER_CONCURRENCY:4}
        max-concurrency: ${IM_RABBITMQ_LISTENER_MAX_CONCURRENCY:16}
        prefetch: ${IM_RABBITMQ_LISTENER_PREFETCH:32}
  flyway:
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: initial schema

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    db:
      enabled: false
    redis:
      enabled: false
    rabbit:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}

im:
  id:
    worker-id: ${IM_WORKER_ID:2}
    lease:
      enabled: ${IM_WORKER_ID_LEASE_ENABLED:true}
      ttl: ${IM_WORKER_ID_LEASE_TTL:30s}
      renew-interval: ${IM_WORKER_ID_LEASE_RENEW_INTERVAL:10s}
  grpc:
    port: ${IM_GRPC_PORT:9091}
  rpc:
    conversation:
      host: ${IM_CONVERSATION_RPC_HOST:localhost}
      port: ${IM_CONVERSATION_RPC_PORT:${im.grpc.port}}
  auth:
    jwt:
      secret: ${IM_AUTH_JWT_SECRET:${JWT_SECRET:dev-only-change-me-please-dev-only-change-me}}
      issuer: im-server
      access-ttl: 2h
      refresh-ttl: 30d
  gateway-auth:
    heartbeat-interval-sec: ${IM_GATEWAY_AUTH_HEARTBEAT_INTERVAL_SEC:30}
  file:
    endpoint: ${IM_MINIO_ENDPOINT:${MINIO_ENDPOINT:http://localhost:9000}}
    public-endpoint: ${IM_MINIO_PUBLIC_ENDPOINT:${MINIO_PUBLIC_ENDPOINT:${im.file.endpoint}}}
    access-key: ${IM_MINIO_ACCESS_KEY:${MINIO_ROOT_USER:im_minio}}
    secret-key: ${IM_MINIO_SECRET_KEY:${MINIO_ROOT_PASSWORD:im_dev_minio_pwd}}
    bucket: ${IM_MINIO_BUCKET:im-media}
    presign-ttl: ${IM_FILE_PRESIGN_TTL:5m}
    download-ttl: ${IM_FILE_DOWNLOAD_TTL:15m}
    cdn-base-url: ${IM_FILE_CDN_BASE_URL:}
    transcode:
      enabled: ${IM_FILE_TRANSCODE_ENABLED:false}
      ffmpeg-path: ${IM_FILE_FFMPEG_PATH:ffmpeg}
      work-dir: ${IM_FILE_TRANSCODE_WORK_DIR:}
      timeout: ${IM_FILE_TRANSCODE_TIMEOUT:10m}
      poll-interval: ${IM_FILE_TRANSCODE_POLL_INTERVAL:10s}
      batch-size: ${IM_FILE_TRANSCODE_BATCH_SIZE:4}
  message:
    retention:
      # 消息保留清理作业（按 tenant_config.msg_retention_days 周期删除过期消息）。
      enabled: ${IM_MSG_RETENTION_ENABLED:true}
      scan-interval-millis: ${IM_MSG_RETENTION_SCAN_INTERVAL_MILLIS:3600000}
      batch-size: ${IM_MSG_RETENTION_BATCH_SIZE:1000}
      max-batches-per-cycle: ${IM_MSG_RETENTION_MAX_BATCHES:50}
  moderation:
    enabled: ${IM_MODERATION_ENABLED:true}
    event-dedup-ttl: ${IM_MODERATION_EVENT_DEDUP_TTL:24h}
    msg-saved-queue: ${IM_MODERATION_MSG_SAVED_QUEUE:im.moderation.msg.saved}
    word-reload-queue: ${IM_MODERATION_WORD_RELOAD_QUEUE:im.moderation.word.reload}
    media-http:
      enabled: ${IM_MODERATION_MEDIA_HTTP_ENABLED:false}
      endpoint: ${IM_MODERATION_MEDIA_HTTP_ENDPOINT:}
      provider: ${IM_MODERATION_MEDIA_HTTP_PROVIDER:http_media}
      bearer-token: ${IM_MODERATION_MEDIA_HTTP_BEARER_TOKEN:}
      hmac-secret: ${IM_MODERATION_MEDIA_HTTP_HMAC_SECRET:}
      timeout: ${IM_MODERATION_MEDIA_HTTP_TIMEOUT:3s}
      revoke-threshold: ${IM_MODERATION_MEDIA_HTTP_REVOKE_THRESHOLD:0.9}
      # 默认 fail-open，第三方审核超时/异常不阻断发送；强监管场景可改 true。
      fail-closed: ${IM_MODERATION_MEDIA_HTTP_FAIL_CLOSED:false}
  outbox:
    enabled: ${IM_OUTBOX_ENABLED:true}
    batch-size: ${IM_OUTBOX_BATCH_SIZE:100}
    interval: ${IM_OUTBOX_INTERVAL:100ms}
    max-retries: ${IM_OUTBOX_MAX_RETRIES:16}
    confirm-timeout: ${IM_OUTBOX_CONFIRM_TIMEOUT:5s}
    claim-ttl: ${IM_OUTBOX_CLAIM_TTL:30s}
  push:
    route-ttl: ${IM_PUSH_ROUTE_TTL:180s}
    event-dedup-ttl: ${IM_PUSH_EVENT_DEDUP_TTL:24h}
    gateway-queue-prefix: ${IM_PUSH_GATEWAY_QUEUE_PREFIX:push.gw.}
    msg-saved-queue: ${IM_PUSH_MSG_SAVED_QUEUE:im.push.msg.saved}
    # 群成员数达到阈值时，媒体消息只推轻量通知，客户端通过 SYNC 拉完整内容；默认 500 与 MVP 群上限一致，
    # 等于默认近似不生效，租户/环境调小才启用；<=0 表示禁用。
    large-group-media-light-push-threshold: ${IM_PUSH_LARGE_GROUP_MEDIA_LIGHT_THRESHOLD:500}
  call: # D45/D50：实时音视频，小群通话走 mesh，默认最多 9 人。
    ring-timeout: ${IM_CALL_RING_TIMEOUT:30s}
    active-ttl: ${IM_CALL_ACTIVE_TTL:4h}
    group-call-max-members: ${IM_CALL_GROUP_MAX_MEMBERS:9}
    stun-urls: ${IM_CALL_STUN_URLS:stun:stun.l.google.com:19302}
    turn-urls: ${IM_CALL_TURN_URLS:} # 如 turn:your-host:3478?transport=udp；为空=仅 STUN（仅限内网联调）
    turn-secret: ${IM_CALL_TURN_SECRET:} # 必须与 coturn static-auth-secret 一致
    turn-credential-ttl: ${IM_CALL_TURN_CREDENTIAL_TTL:1h}
  startup-check:
    enabled: ${IM_STARTUP_CHECK_ENABLED:false}
    mysql: ${IM_STARTUP_CHECK_MYSQL:true}
    redis: ${IM_STARTUP_CHECK_REDIS:true}
    rabbitmq: ${IM_STARTUP_CHECK_RABBITMQ:true}
    minio: ${IM_STARTUP_CHECK_MINIO:true}
    required-tables:
      - tenant
      - user
      - conversation
      - conversation_member
      - message
      - outbox
    minio-config:
      endpoint: ${IM_MINIO_ENDPOINT:${MINIO_ENDPOINT:http://localhost:9000}}
      access-key: ${IM_MINIO_ACCESS_KEY:${MINIO_ROOT_USER:im_minio}}
      secret-key: ${IM_MINIO_SECRET_KEY:${MINIO_ROOT_PASSWORD:im_dev_minio_pwd}}
      bucket: ${IM_MINIO_BUCKET:im-media}
