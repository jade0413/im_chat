server:
  port: 8081

spring:
  application:
    name: im-server
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${IM_MYSQL_URL:jdbc:mysql://localhost:3306/im?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${IM_MYSQL_USERNAME:root}
    password: ${IM_MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${IM_REDIS_HOST:localhost}
      port: ${IM_REDIS_PORT:6379}
      password:
  rabbitmq:
    host: ${IM_RABBITMQ_HOST:${RABBITMQ_HOST:103.45.65.84}}
    port: ${IM_RABBITMQ_PORT:${RABBITMQ_PORT:5672}}
    username: ${IM_RABBITMQ_USERNAME:${RABBITMQ_USER:admin}}
    password: ${IM_RABBITMQ_PASSWORD:${RABBITMQ_PASSWORD:admin123}}
    publisher-confirm-type: correlated
    listener:
      simple:
        auto-startup: ${IM_RABBITMQ_LISTENER_AUTO_STARTUP:true}
  flyway:
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: initial schema

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    db:
      enabled: false
    redis:
      enabled: false
    rabbit:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}

im:
  id:
    worker-id: ${IM_WORKER_ID:1}
    lease:
      enabled: ${IM_WORKER_ID_LEASE_ENABLED:true}
      ttl: ${IM_WORKER_ID_LEASE_TTL:30s}
      renew-interval: ${IM_WORKER_ID_LEASE_RENEW_INTERVAL:10s}
  grpc:
    port: ${IM_GRPC_PORT:9091}
  rpc:
    conversation:
      host: ${IM_CONVERSATION_RPC_HOST:localhost}
      port: ${IM_CONVERSATION_RPC_PORT:${im.grpc.port}}
  auth:
    jwt:
      secret: ${IM_AUTH_JWT_SECRET:${JWT_SECRET:dev-only-change-me-please-dev-only-change-me}}
      issuer: im-server
      access-ttl: 2h
      refresh-ttl: 30d
  gateway-auth:
    heartbeat-interval-sec: ${IM_GATEWAY_AUTH_HEARTBEAT_INTERVAL_SEC:30}
  outbox:
    enabled: ${IM_OUTBOX_ENABLED:false}
    batch-size: ${IM_OUTBOX_BATCH_SIZE:100}
    interval: ${IM_OUTBOX_INTERVAL:100ms}
    max-retries: ${IM_OUTBOX_MAX_RETRIES:16}
    confirm-timeout: ${IM_OUTBOX_CONFIRM_TIMEOUT:5s}
    claim-ttl: ${IM_OUTBOX_CLAIM_TTL:30s}
  push:
    route-ttl: ${IM_PUSH_ROUTE_TTL:90s}
    event-dedup-ttl: ${IM_PUSH_EVENT_DEDUP_TTL:24h}
    gateway-queue-prefix: ${IM_PUSH_GATEWAY_QUEUE_PREFIX:push.gw.}
    msg-saved-queue: ${IM_PUSH_MSG_SAVED_QUEUE:im.push.msg.saved}
  startup-check:
    enabled: ${IM_STARTUP_CHECK_ENABLED:false}
    mysql: ${IM_STARTUP_CHECK_MYSQL:true}
    redis: ${IM_STARTUP_CHECK_REDIS:true}
    rabbitmq: ${IM_STARTUP_CHECK_RABBITMQ:true}
    minio: ${IM_STARTUP_CHECK_MINIO:true}
    required-tables:
      - tenant
      - user
      - conversation
      - conversation_member
      - message
      - outbox_event
    minio-config:
      endpoint: ${IM_MINIO_ENDPOINT:${MINIO_ENDPOINT:http://localhost:9000}}
      access-key: ${IM_MINIO_ACCESS_KEY:${MINIO_ROOT_USER:im_minio}}
      secret-key: ${IM_MINIO_SECRET_KEY:${MINIO_ROOT_PASSWORD:im_dev_minio_pwd}}
      bucket: ${IM_MINIO_BUCKET:im-media}
